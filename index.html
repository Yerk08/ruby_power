<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
		<link rel="stylesheet" href="style.css">
		<script src="field_lib.js"></script>
		<script src="cache_saver.js"></script>
	</head>
	<body ondragstart="return false;" ondrop="return false;">
		<div id="shield_field_was"></div>
		<div id="shield_field"></div>
		<div id="gems_field"></div>
		<div id="animation_field"></div>
		<div id="score"></div>
		<img id="restart_button" src="images/restart_button.png" onclick="restart_game()"></img>
		<div id="stone_counter"></div>
		<div id="shield_counter"></div>
		<img id="next_button" src="images/arrow_right.png" onclick="next_field()"></img>
		<img id="prev_button" src="images/arrow_left.png" onclick="prev_field()"></img>
		<img id="edit_button" src="images/edit_button.png" onclick="run_edit_mode()"></img>
	</body>
	<script src="animation_game.js"></script>
</html>
